name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install libusb swiftlint clang-format
      - name: Check Swift version file
        run: test "$(cat .swift-version)" = "6.2"
      - name: SwiftLint
        run: swiftlint lint --strict
      - name: C shim formatting
        run: clang-format --dry-run --Werror Sources/CLibUSB/shim.h Sources/CLibUSB/module.modulemap
      - name: Build public symbol graph
        run: swift package dump-symbol-graph --minimum-access-level public
      - name: Test
        run: swift test
      - name: Create source archive
        run: swift package archive-source --output .build/SwiftUSB-${{ github.ref_name }}.zip
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" .build/SwiftUSB-${{ github.ref_name }}.zip --title "SwiftUSB ${{ github.ref_name }}" --notes "Swift Package Manager release for SwiftUSB ${{ github.ref_name }}" --verify-tag
