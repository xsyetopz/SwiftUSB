name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag ||
        github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Validate release tag
        run: |
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          git rev-parse "$RELEASE_TAG^{commit}"
      - name: Install tools
        run: brew install libusb swiftlint clang-format
      - name: Check Swift version file
        run: test "$(cat .swift-version)" = "6.1"
      - name: Show Swift version
        run: swift --version
      - name: SwiftLint
        run: swiftlint lint --strict
      - name: C shim formatting
        run: |
          clang-format --dry-run --Werror Sources/CLibUSB/shim.h Sources/CLibUSB/module.modulemap
      - name: Build public symbol graph
        run: |
          swift build --target SwiftUSB -Xswiftc -emit-symbol-graph -Xswiftc -emit-symbol-graph-dir -Xswiftc .build/symbol-graphs
      - name: Test
        run: swift test
      - name: Create source archive
        run: |
          swift package archive-source --output ".build/SwiftUSB-$RELEASE_TAG.zip"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" ".build/SwiftUSB-$RELEASE_TAG.zip" --title "SwiftUSB $RELEASE_TAG" --notes "Swift Package Manager release for SwiftUSB $RELEASE_TAG" --verify-tag
