name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.2"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Validate release state
        run: |
          [[ "$RELEASE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(cat VERSION)" = "$RELEASE_TAG"
          git fetch origin main --no-tags
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release tag $RELEASE_TAG already exists" >&2
            exit 1
          fi
          ./scripts/bump-version.py --check
          ./scripts/bump-version.py --release-notes > .build-release-notes.md
      - name: Install tools
        run: brew install libusb swiftlint clang-format
      - name: Check Swift version file
        run: test "$(cat .swift-version)" = "6.1"
      - name: Show Swift version
        run: swift --version
      - name: SwiftLint
        run: swiftlint lint --strict
      - name: C shim formatting
        run: |
          clang-format --dry-run --Werror Sources/CLibUSB/shim.h Sources/CLibUSB/module.modulemap
      - name: Build public symbol graph
        run: |
          swift build --target SwiftUSB -Xswiftc -emit-symbol-graph -Xswiftc -emit-symbol-graph-dir -Xswiftc .build/symbol-graphs
      - name: Test
        run: swift test
      - name: Create source archive
        run: |
          swift package archive-source --output ".build/SwiftUSB-$RELEASE_TAG.zip"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main --no-tags
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release tag $RELEASE_TAG already exists" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" ".build/SwiftUSB-$RELEASE_TAG.zip" \
            --target "$(git rev-parse HEAD)" \
            --title "SwiftUSB $RELEASE_TAG" \
            --notes-file .build-release-notes.md
