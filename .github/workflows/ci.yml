name: CI

on:
  push:
    branches: [ main ]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install libusb swiftlint clang-format
      - name: Check Swift version file
        run: test "$(cat .swift-version)" = "6.1"
      - name: Show Swift version
        run: swift --version
      - name: SwiftLint
        run: swiftlint lint --strict
      - name: C shim formatting
        run: clang-format --dry-run --Werror Sources/CLibUSB/shim.h
          Sources/CLibUSB/module.modulemap
      - name: Build public symbol graph
        run: swift package dump-symbol-graph --minimum-access-level public
      - name: Test
        run: swift test
      - name: Create source archive
        if: startsWith(github.ref, 'refs/tags/')
        run: swift package archive-source --output .build/SwiftUSB.zip
